name: Build SOPSoft APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet and Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet[all]

      - name: Build APK
        # 1. Usamos 'app.py' como argumento principal.
        # 2. Eliminamos '--no-interactive' para evitar el error de argumentos.
        # 3. 'yes' se encarga de aceptar la descarga del SDK de Flutter.
        run: |
          yes | flet build apk app.py

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SOPSoft-Release-APK
          path: build/apk/*.apk