name: Build Flet APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet
          # Instala librerías extra si existe el archivo
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build APK
        run: |
          # 1. Aceptamos las licencias de Android que el doctor marcó como pendientes
          yes | flutter doctor --android-licenses || true
          
          # 2. Usamos printf para decir "y" a la instalación del SDK de Flutter
          # Usamos "." para que Flet busque el main.py en la raíz del repo
          printf 'y\n' | flet build apk . --project "Sistema Inventario"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Sistema-Inventario-APK
          path: build/apk/*.apk